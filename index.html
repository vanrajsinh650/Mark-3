<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Iron Man Mark 3 Helmet AR Filter" />
  <title>MARK III — AR Helmet</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-title">MARK III</div>
    <div class="loading-subtitle">Loading helmet model...</div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
  </div>

  <!-- Main App: just webcam + 3D overlay -->
  <div id="app">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>
  </div>

  <!-- Drop Zone for custom models -->
  <div id="drop-zone">
    <div class="drop-label">DROP .GLB MODEL HERE</div>
  </div>

  <!-- Minimal floating controls -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-snapshot" title="Take photo">📸</button>
    <button class="ctrl-btn" id="btn-record" title="Record video">⏺</button>
    <button class="ctrl-btn" id="btn-sliders" title="Adjust helmet">⚙</button>
  </div>

  <!-- Recording indicator -->
  <div class="recording-indicator" id="rec-indicator">
    <div class="rec-dot"></div>
    <span>REC</span>
  </div>

  <!-- Slider panel (hidden by default) -->
  <div class="slider-panel" id="slider-panel">
    <label>
      X Offset
      <input type="range" id="offset-x" min="-15" max="15" step="0.1" value="0" />
    </label>
    <label>
      Y Offset
      <input type="range" id="offset-y" min="-15" max="15" step="0.1" value="0" />
    </label>
    <label>
      Z Offset
      <input type="range" id="offset-z" min="-30" max="30" step="0.1" value="0" />
    </label>
    <label>
      Pitch
      <input type="range" id="rotate-x" min="-45" max="45" step="1" value="12" />
    </label>
    <label>
      Yaw
      <input type="range" id="rotate-y" min="-45" max="45" step="1" value="0" />
    </label>
    <label>
      Scale
      <input type="range" id="helmet-scale" min="0.5" max="2.0" step="0.05" value="1.0" />
    </label>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
